name: rawby-react-ci

# Build-check the React web client on changes under Rawby-react/.
# Does not touch the Dart server build or deploy anything.
on:
  push:
    branches: [main, add-rawby-react-web]
    paths:
      - "Rawby-react/**"
      - ".github/workflows/rawby-react-ci.yml"
  pull_request:
    paths:
      - "Rawby-react/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rawby-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Rawby-react/package-lock.json
      - run: npm ci
      - run: npm run build

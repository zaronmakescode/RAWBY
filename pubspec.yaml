name: rawby
description: RAWBY — Weekly filmmaking challenge app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  go_router: ^14.8.1
  dio: ^5.7.0
  intl: ^0.20.2
  flutter_animate: ^4.5.0
  speech_to_text: ^7.0.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

# App launcher icon (pine-green frosted glass squircle). Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icons/app_icon.png"
  android: true
  ios: false
  adaptive_icon_background: "#070E0A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: true
  windows:
    generate: true
    icon_size: 256

flutter:
  uses-material-design: true
